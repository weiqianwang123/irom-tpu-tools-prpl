# Default IROM TPU queue configuration.
#
# Normal users only need write/read access to these queue prefixes. The
# scheduler service account needs TPU Admin, Service Account User for the TPU
# worker service accounts, Secret Manager access, and read/write access here.

quota_groups:
  v4:
    total_chips: 32
  v5:
    total_chips: 64
  v6:
    total_chips: 512

resources:
  v4-4:
    version: v4
    accelerator_type: v4-4
    runtime_version: tpu-ubuntu2204-base
    zone: us-central2-b
    project: mae-irom-lab-guided-data
    chips: 4
    workers: 1
    spot: true
    enabled: true
    quota_group: v4
    service_account: tpu-sa-us-central2@mae-irom-lab-guided-data.iam.gserviceaccount.com
  v4-8:
    version: v4
