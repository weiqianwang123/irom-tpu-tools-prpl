# PRPL lab TPU queue configuration.
#
# Normal users only need write/read access to the queue bucket prefixes below.
# The scheduler service account needs TPU Admin, Service Account User for the
# TPU worker service accounts, Secret Manager access, and read/write here.
#
# ---------------------------------------------------------------------------
# GCP identity for project tpu-tsilver-20260619 (number 944301850228).
# Queue buckets, worker service account, and admin user are filled in below.
# The 4 queue buckets must exist and be readable/writable by users and the
# scheduler; the worker service account must be able to read code archives,
# write logs, and access datasets/checkpoints.
#
# Modeling notes for the 6 quota grants:
#   * spot and on-demand are SEPARATE GCP quotas even in the same zone, so v4
#     spot and v4 on-demand are two quota groups (v4 / v4od) with distinct
#     resource names. `tpu create v4 -n 32` picks the spot v4-32; on-demand is
#     opt-in via `tpu create v4 -r v4od-32 -- ...`.
#   * v6e in us-east1-d and v6e in europe-west4-a are separate regional quotas,
#     so they are separate groups (v6 / v6eu). Europe is opt-in via
#     `-r v6eu-64`; likewise v5eu for europe-west4-b.
#   * `chips` here follows the accelerator-type suffix (v4-64 -> 64) so that the
#     `-n` lookup and quota accounting stay in one unit. For v4 that suffix
#     counts TensorCores (2 per physical chip): the v4 grant is 32 physical
#     chips = 64 TensorCores, so the v4/v4od groups cap at 64 and the largest
#     slice is v4-64 (`tpu create v4 -n 64`).
# ---------------------------------------------------------------------------

quota_groups:
  v4:
    total_chips: 64       # 32 physical spot v4 chips = 64 TensorCores, us-central2-b
  v4od:
    total_chips: 64       # 32 physical on-demand v4 chips = 64 TensorCores, us-central2-b
  v6:
    total_chips: 64       # 64 spot v6e, us-east1-d
  v5:
    total_chips: 64       # 64 spot v5e, us-central1-a
  v6eu:
    total_chips: 64       # 64 spot v6e, europe-west4-a
  v5eu:
    total_chips: 64       # 64 spot v5e, europe-west4-b

resources:
  # --- v4 spot, us-central2-b ---
  v4-8:
    version: v4
    accelerator_type: v4-8
    runtime_version: tpu-ubuntu2204-base
    zone: us-central2-b
    project: tpu-tsilver-20260619
    chips: 8
    workers: 1
    spot: true
    enabled: true
    quota_group: v4
    service_account: tpu-worker@tpu-tsilver-20260619.iam.gserviceaccount.com
  v4-16:
    version: v4
    accelerator_type: v4-16
    runtime_version: tpu-ubuntu2204-base
