# One bucket per region. europe-west4-a and europe-west4-b share the
# europe-west4 region and therefore one bucket.
buckets:
  us-central2: gs://prpl-tpu-queue-us-central2-944301850228/tpu-job-queue
  us-east1: gs://prpl-tpu-queue-us-east1-944301850228/tpu-job-queue
  us-central1: gs://prpl-tpu-queue-us-central1-944301850228/tpu-job-queue
  europe-west4: gs://prpl-tpu-queue-europe-west4-944301850228/tpu-job-queue

primary_bucket_region: us-central2

# No shared interactive TPUs configured yet. To add them later, restore an
# `interactive_tpus:` block (the code currently supports v4 only).

scheduler:
  scan_interval_seconds: 30
  create_failure_backoff_seconds: 300
  active_no_claim_timeout_seconds: 1800
  heartbeat_timeout_seconds: 600
  status_write_interval_seconds: 60
  job_retention_days: 30
  qr_prefix: prpl
  qr_label_workaround: false

user_limits:
  default_max_chips: 192
  users:
    robin: null

# Optional default Secret Manager mappings for queued workers. Keep empty unless
# the referenced secret exists and the TPU service account can read it.
# Example:
#   WANDB_API_KEY: wandb-api-key
secrets: {}
