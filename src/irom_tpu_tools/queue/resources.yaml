buckets:
  us-central2: gs://pi0-cot/tpu-job-queue
  us-central1: gs://v5_central1_a/tpu-job-queue
  us-east1: gs://v6_east1d/tpu-job-queue

primary_bucket_region: us-central2

interactive_tpus:
  v4-16-01-interactive:
    version: v4
    zone: us-central2-b
    project: mae-irom-lab-guided-data
    workers: 4
    aliases:
      - v4-16-interactive
      - v4-32-interactive
    description: Shared multi-host v4 interactive TPU.
  v4-4-01-interactive:
    version: v4
    zone: us-central2-b
    project: mae-irom-lab-guided-data
    workers: 1
    aliases:
      - v4-interactive
      - v4-4-interactive-01
    description: Shared v4-8 interactive TPU.
  v4-4-02-interactive:
    version: v4
    zone: us-central2-b
    project: mae-irom-lab-guided-data
    workers: 1
    aliases:
      - v4-4-interactive-02
    description: Shared v4-8 interactive TPU.
  v4-4-03-interactive:
    version: v4
    zone: us-central2-b
    project: mae-irom-lab-guided-data
    workers: 1
    aliases:
      - v4-4-interactive-03
    description: Shared v4-8 interactive TPU.
  v4-4-04-interactive:
    version: v4
    zone: us-central2-b
    project: mae-irom-lab-guided-data
    workers: 1
    aliases:
      - v4-4-interactive-04
    description: Shared v4-8 interactive TPU.

scheduler:
  scan_interval_seconds: 30
  create_failure_backoff_seconds: 300
  active_no_claim_timeout_seconds: 1800
  heartbeat_timeout_seconds: 600
  status_write_interval_seconds: 60
  job_retention_days: 30
  qr_prefix: iq
  qr_label_workaround: false

user_limits:
  default_max_chips: 192
  users:
    admin: null

# Optional default Secret Manager mappings for queued workers. Keep empty unless
# the referenced secret exists and the TPU service account can read it.
secrets: {}
